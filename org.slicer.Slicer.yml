app-id: org.slicer.Slicer
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: slicer

finish-args:
  # Display
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  # 3D rendering
  - --device=dri
  # Extension manager and DICOM networking
  - --share=network
  # Medical image files can live anywhere under home
  - --filesystem=home
  # QtWebEngine (used by Slicer's web views) conflicts with Flatpak's seccomp filter
  - --env=QTWEBENGINE_DISABLE_SANDBOX=1
  # Force XCB backend; Slicer's bundled Qt may not support Wayland natively
  - --env=QT_QPA_PLATFORM=xcb

modules:
  - name: glu
    buildsystem: meson
    config-opts:
      - -Dgl_provider=gl
    sources:
      - type: archive
        url: https://mesa.freedesktop.org/archive/glu/glu-9.0.3.tar.xz
        sha256: bd43fe12f374b1192eb15fe20e45ff456b9bc26ab57f0eee919f96ca0f8a330f

  - name: slicer
    buildsystem: simple
    build-commands:
      # Install Slicer tree to /app/opt/Slicer
      - install -d /app/opt
      - cp -r slicer-bin /app/opt/Slicer
      - chmod +x /app/opt/Slicer/Slicer

      # Wrapper script
      - install -Dm755 slicer.sh /app/bin/slicer

      # Desktop integration
      - install -Dm644 org.slicer.Slicer.desktop /app/share/applications/org.slicer.Slicer.desktop
      - install -Dm644 org.slicer.Slicer.metainfo.xml /app/share/metainfo/org.slicer.Slicer.metainfo.xml

      # Icons (sourced from Slicer GitHub repo below, not bundled in the tarball)
      - install -Dm644 icon-16.png  /app/share/icons/hicolor/16x16/apps/org.slicer.Slicer.png
      - install -Dm644 icon-32.png  /app/share/icons/hicolor/32x32/apps/org.slicer.Slicer.png
      - install -Dm644 icon-48.png  /app/share/icons/hicolor/48x48/apps/org.slicer.Slicer.png
      - install -Dm644 icon-64.png  /app/share/icons/hicolor/64x64/apps/org.slicer.Slicer.png
      - install -Dm644 icon-128.png /app/share/icons/hicolor/128x128/apps/org.slicer.Slicer.png

    sources:
      # -----------------------------------------------------------------------
      # Slicer 5.12.0 — Linux amd64
      # Bitstream ID: 6a3b212e3e1fb85a5846b058
      # To update: ./update.sh <NEW_VERSION> <NEW_BITSTREAM_ID>
      # (Find BITSTREAM_ID at https://download.slicer.org via DevTools → Network)
      # -----------------------------------------------------------------------
      - type: archive
        url: https://slicer-packages.kitware.com/api/v1/item/6a3b212e3e1fb85a5846b058/download
        dest-filename: Slicer-5.12.0-linux-amd64.tar.gz
        sha256: fadd3ac918ac47e5381fa87600798051774cf7e5bf2436c6757ed4bc944e71a1
        dest: slicer-bin
        strip-components: 1

      - type: file
        path: slicer.sh

      - type: file
        path: org.slicer.Slicer.desktop

      - type: file
        path: org.slicer.Slicer.metainfo.xml

      # Icons from Slicer GitHub (pinned to main; from Applications/SlicerApp/Resources/Icons/)
      - type: file
        url: https://raw.githubusercontent.com/Slicer/Slicer/main/Applications/SlicerApp/Resources/Icons/Small/Slicer-DesktopIcon.png
        sha256: b01e4d59f07f1eda18a2c04a9130c7e3bcf2f8cff9ef7213f6381a53896ceb29
        dest-filename: icon-16.png
      - type: file
        url: https://raw.githubusercontent.com/Slicer/Slicer/main/Applications/SlicerApp/Resources/Icons/Medium/Slicer-DesktopIcon.png
        sha256: 7524622e3e1721b9ff8d8f759bf2460d9a7b84a6cd07cd8118f06f6b4be9b69d
        dest-filename: icon-32.png
      - type: file
        url: https://raw.githubusercontent.com/Slicer/Slicer/main/Applications/SlicerApp/Resources/Icons/Large/Slicer-DesktopIcon.png
        sha256: cf7e925a7d5dcf53600a3d012102a9bbd9106f380ae736c6a50c13a1a860ef42
        dest-filename: icon-48.png
      - type: file
        url: https://raw.githubusercontent.com/Slicer/Slicer/main/Applications/SlicerApp/Resources/Icons/XLarge/Slicer-DesktopIcon.png
        sha256: 2420811e7b47f48873147a86b0213289581328b2f9a331be0711f91f8f511ce8
        dest-filename: icon-64.png
      - type: file
        url: https://raw.githubusercontent.com/Slicer/Slicer/main/Applications/SlicerApp/Resources/Icons/XXLarge/Slicer-DesktopIcon.png
        sha256: 3e76e0da124634ada5db5e1149b2b30edffa9018744aef201631e27c1e676c33
        dest-filename: icon-128.png
