name: Build and release Flatpak

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install runtime and SDK
        run: flatpak install --user -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: .flatpak-builder/downloads
          key: flatpak-dl-${{ hashFiles('org.slicer.Slicer.yml') }}
          restore-keys: flatpak-dl-

      - name: Build
        run: flatpak-builder --force-clean --repo=repo build-dir org.slicer.Slicer.yml

      - name: Install locally for testing
        run: flatpak install --user -y repo org.slicer.Slicer

      - name: Check for missing libraries
        run: |
          missing=$(flatpak run --command=bash org.slicer.Slicer -c "
            find /app -type f \( -name '*.so' -o -name '*.so.*' -o -name 'SlicerApp-real' \) 2>/dev/null \
              | xargs ldd 2>/dev/null \
              | grep 'not found' \
              | awk '{print \$1}' \
              | sort -u
          ")
          if [ -n "$missing" ]; then
            echo "::error::Missing libraries inside Flatpak sandbox:"
            echo "$missing"
            exit 1
          fi
          echo "All libraries resolved inside sandbox."

      - name: Export bundle
        run: flatpak build-bundle "${HOME}/.local/share/flatpak/repo" org.slicer.Slicer.flatpak org.slicer.Slicer

      - name: Get Slicer version
        id: ver
        run: |
          echo "version=$(grep -oP 'Slicer-\K[\d.]+(?=-linux-amd64)' org.slicer.Slicer.yml | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: "3D Slicer ${{ steps.ver.outputs.version }}"
          make_latest: true
          files: org.slicer.Slicer.flatpak
          body: |
            Flatpak bundle for 3D Slicer ${{ steps.ver.outputs.version }}.

            **Install:**
            ```bash
            flatpak install org.slicer.Slicer.flatpak
            ```

            **Troubleshooting:** if the app fails with "Could not initialize GLX",
            install the GPU driver extension for the runtime branch:
            ```bash
            flatpak install flathub org.freedesktop.Platform.GL.default//25.08
            ```
